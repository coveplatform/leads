<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="glow" cx="20%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#e8540a" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#0e0c0a" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1.2" fill="white" opacity="0.035"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0e0c0a"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Top coral accent line -->
  <rect x="80" y="0" width="120" height="4" rx="2" fill="#e8540a"/>

  <!-- ─── Logo ───
       64×64 box at (80, 52). Centre = (112, 84).
       Favicon arcs scaled ×2 and offset (+80, +52):
         bottom:  M5 23.5 → M(5×2+80) (23.5×2+52)  = M90 99
         middle:  M7 17   → M(7×2+80) (17×2+52)     = M94 86
         top:     M10 10.5→ M(10×2+80)(10.5×2+52)   = M100 73    -->
  <rect x="80" y="52" width="64" height="64" rx="14" fill="#e8540a"/>
  <path d="M90 99  Q101 91 112 99  Q123 107 134 99"  stroke="white" stroke-width="5"   stroke-linecap="round" fill="none"/>
  <path d="M94 86  Q103 78 112 86  Q121  94 130 86"  stroke="white" stroke-width="4"   stroke-linecap="round" fill="none" opacity="0.75"/>
  <path d="M100 73 Q106 67 112 73  Q118  79 124 73"  stroke="white" stroke-width="3"   stroke-linecap="round" fill="none" opacity="0.45"/>

  <!-- Logo wordmark -->
  <text x="158" y="95" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="36" font-weight="700" fill="white" letter-spacing="-0.5">cove</text>

  <!-- ─── Headline ─── -->
  <text x="80" y="270" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="86" font-weight="800" fill="white"    letter-spacing="-3">Stop losing jobs</text>
  <text x="80" y="368" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="86" font-weight="800" fill="#e8540a"   letter-spacing="-3">while you're working.</text>

  <!-- ─── Sub ─── -->
  <text x="80" y="428" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="26" fill="#78716c" letter-spacing="-0.2">Texts leads back in 10 seconds · Qualifies them · Sends you a ready-to-call summary.</text>

  <!-- ─── Badges ─── -->
  <!-- Badge 1: 14-day free trial -->
  <rect x="80"  y="468" width="284" height="52" rx="26" fill="#1c1917"/>
  <rect x="80"  y="468" width="284" height="52" rx="26" fill="white" fill-opacity="0.04"/>
  <circle cx="112" cy="494" r="8" fill="#e8540a"/>
  <text x="130" y="500" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="18" font-weight="600" fill="white">14-day free trial</text>

  <!-- Badge 2: no card needed -->
  <rect x="380" y="468" width="234" height="52" rx="26" fill="#1c1917"/>
  <rect x="380" y="468" width="234" height="52" rx="26" fill="white" fill-opacity="0.04"/>
  <circle cx="410" cy="494" r="8" fill="#16a34a"/>
  <text x="428" y="500" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="18" font-weight="600" fill="white">No card needed</text>

  <!-- Badge 3: AU phone number -->
  <rect x="630" y="468" width="254" height="52" rx="26" fill="#1c1917"/>
  <rect x="630" y="468" width="254" height="52" rx="26" fill="white" fill-opacity="0.04"/>
  <circle cx="660" cy="494" r="8" fill="#0891b2"/>
  <text x="678" y="500" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="18" font-weight="600" fill="white">AU phone included</text>

  <!-- ─── Domain (bottom right) ─── -->
  <text x="1120" y="598" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="20" fill="#3f3f46" text-anchor="end" letter-spacing="-0.3">usecove.app</text>
</svg>
