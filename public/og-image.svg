<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="glow" cx="22%" cy="45%" r="58%">
      <stop offset="0%" stop-color="#e8540a" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#0e0c0a" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1.2" fill="white" opacity="0.035"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0e0c0a"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Top coral accent -->
  <rect x="80" y="0" width="120" height="4" rx="2" fill="#e8540a"/>

  <!--
    ── Logo mark ──
    The nav logo uses a 28×28 viewBox with these arc paths:
      bottom: M5 19.5 Q9 17 14 19.5 Q19 22 23 19.5
      middle: M5 14.5 Q9 12 14 14.5 Q19 17 23 14.5
      top:    M5  9.5 Q9  7 14  9.5 Q19 12 23  9.5

    We place a 64×64 box at (80, 52), so scale = 64/28 ≈ 2.2857
    and offset every point by (+80, +52).

    Precomputed (rounded to 1 dp):
      bottom: M91.4 96.6  Q100.6 90.9  112 96.6  Q123.4 102.3 132.6 96.6
      middle: M91.4 85.1  Q100.6 79.4  112 85.1  Q123.4  90.9 132.6 85.1
      top:    M91.4 73.7  Q100.6 68.0  112 73.7  Q123.4  79.4 132.6 73.7
    stroke-width: 2.3 × 2.2857 ≈ 5.3 → use 5
  -->
  <rect x="80" y="52" width="64" height="64" rx="14" fill="#e8540a"/>
  <path d="M91.4 96.6 Q100.6 90.9 112 96.6 Q123.4 102.3 132.6 96.6" stroke="white" stroke-width="5" stroke-linecap="round" fill="none"/>
  <path d="M91.4 85.1 Q100.6 79.4 112 85.1 Q123.4 90.9  132.6 85.1" stroke="white" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.7"/>
  <path d="M91.4 73.7 Q100.6 68.0 112 73.7 Q123.4 79.4  132.6 73.7" stroke="white" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.38"/>

  <!-- Logo wordmark -->
  <text x="158" y="97" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="38" font-weight="700" fill="white" letter-spacing="-1">cove</text>

  <!-- Headline -->
  <text x="80" y="268" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="86" font-weight="800" fill="white"    letter-spacing="-3">Stop losing jobs</text>
  <text x="80" y="366" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="86" font-weight="800" fill="#e8540a"   letter-spacing="-3">while you're working.</text>

  <!-- Sub -->
  <text x="80" y="428" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="26" fill="#78716c" letter-spacing="-0.2">Texts leads back in 10 seconds · Qualifies them · Sends you a ready-to-call summary.</text>

  <!-- Badges -->
  <rect x="80"  y="468" width="258" height="52" rx="26" fill="#1c1917"/>
  <circle cx="110" cy="494" r="8" fill="#e8540a"/>
  <text x="128" y="500" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="18" font-weight="600" fill="white">7-day free trial</text>

  <rect x="354" y="468" width="238" height="52" rx="26" fill="#1c1917"/>
  <circle cx="384" cy="494" r="8" fill="#16a34a"/>
  <text x="402" y="500" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="18" font-weight="600" fill="white">2-minute setup</text>

  <rect x="608" y="468" width="226" height="52" rx="26" fill="#1c1917"/>
  <circle cx="638" cy="494" r="8" fill="#0891b2"/>
  <text x="656" y="500" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="18" font-weight="600" fill="white">Cancel anytime</text>

  <!-- Domain -->
  <text x="1120" y="598" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="20" fill="#3f3f46" text-anchor="end" letter-spacing="-0.3">usecove.app</text>
</svg>
