<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="glow" cx="28%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#e8540a" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#0e0c0a" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#ffffff" opacity="0.04"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0e0c0a"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- ── Logo mark ──
       Favicon is 32×32 at origin. Here we place a 64×64 rect at (72,72),
       centre = (104,104). Scale arcs ×2 then translate +72 on both axes. -->
  <rect x="72" y="72" width="64" height="64" rx="14" fill="#e8540a"/>
  <!-- bottom arc:  M5 23.5 … → ×2 +72  =  M82 119  Q93 111 104 119  Q115 127 126 119 -->
  <path d="M82 119 Q93 111 104 119 Q115 127 126 119" stroke="white" stroke-width="5" stroke-linecap="round" fill="none"/>
  <!-- middle arc:  M7 17   … → ×2 +72  =  M86 106  Q95  98 104 106  Q113 114 122 106 -->
  <path d="M86 106 Q95 98 104 106 Q113 114 122 106"  stroke="white" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.75"/>
  <!-- top arc:     M10 10.5… → ×2 +72  =  M92  93  Q98  87 104  93  Q110  99 116  93 -->
  <path d="M92 93 Q98 87 104 93 Q110 99 116 93"      stroke="white" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.45"/>

  <!-- Logo wordmark -->
  <text x="152" y="118" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="38" font-weight="700" fill="white" letter-spacing="-1">cove</text>

  <!-- Headline -->
  <text x="72" y="264" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="74" font-weight="800" fill="white"       letter-spacing="-2">Stop losing jobs</text>
  <text x="72" y="352" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="74" font-weight="800" fill="#e8540a"      letter-spacing="-2">while you're working.</text>

  <!-- Subheading -->
  <text x="72" y="418" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="27" fill="#a8a29e" letter-spacing="-0.2">Cove texts your missed calls back in 10 seconds — qualifies them,</text>
  <text x="72" y="454" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="27" fill="#a8a29e" letter-spacing="-0.2">and sends you a ready-to-call summary.</text>

  <!-- CTA pill -->
  <rect x="72" y="496" width="308" height="60" rx="30" fill="#e8540a"/>
  <text x="226" y="536" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" font-weight="700" fill="white" text-anchor="middle">Start free trial →</text>

  <!-- ── Right column: SMS conversation ── -->

  <!-- Incoming bubble 1 -->
  <rect x="740" y="160" width="400" height="86" rx="18" fill="#1c1917"/>
  <text x="760" y="194" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" fill="#78716c">Bay Plumbing</text>
  <text x="760" y="216" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="17" fill="white">Hi Sam! We missed your call —</text>
  <text x="760" y="238" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="17" fill="white">how urgent is this?</text>

  <!-- Outgoing bubble (user reply) -->
  <rect x="940" y="262" width="200" height="48" rx="16" fill="#e8540a" fill-opacity="0.2"/>
  <text x="1040" y="292" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="19" font-weight="700" fill="#ff7240" text-anchor="middle">A — Emergency</text>

  <!-- Incoming bubble 2 -->
  <rect x="740" y="326" width="400" height="62" rx="18" fill="#1c1917"/>
  <text x="760" y="353" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" fill="#78716c">Bay Plumbing</text>
  <text x="760" y="378" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="17" fill="white">Emergency — got it. What's the issue?</text>

  <!-- Notification card -->
  <rect x="740" y="408" width="420" height="116" rx="16" fill="#1c1917"/>
  <rect x="740" y="408" width="420" height="4"   rx="2"  fill="#e8540a"/>
  <text x="760" y="436" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" fill="#78716c">Cove · now</text>
  <text x="760" y="460" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="white">New Urgent Lead — Bay Plumbing</text>
  <text x="760" y="484" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" fill="#a8a29e">Sam Thompson · Burst pipe · Emergency</text>
  <text x="760" y="506" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" fill="#a8a29e">0412 345 678 · Call back ASAP</text>

  <!-- Domain -->
  <text x="1148" y="598" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="19" fill="#52525b" text-anchor="end">usecove.app</text>
</svg>
