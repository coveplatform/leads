<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset password — Cove</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/dash.css" />
</head>
<body class="auth-root">

  <div class="auth-card">
    <div class="auth-logo">
      <a href="/" class="cove-logo">
        <svg width="30" height="30" viewBox="0 0 28 28" fill="none">
          <path d="M5 19.5 Q9 17 14 19.5 Q19 22 23 19.5" stroke="#e8540a" stroke-width="2.3" stroke-linecap="round" fill="none"/>
          <path d="M5 14.5 Q9 12 14 14.5 Q19 17 23 14.5" stroke="#e8540a" stroke-width="2.3" stroke-linecap="round" fill="none" opacity="0.65"/>
          <path d="M5 9.5 Q9 7 14 9.5 Q19 12 23 9.5" stroke="url(#rp-lg)" stroke-width="2.3" stroke-linecap="round" fill="none" opacity="0.4"/>
          <defs>
            <linearGradient id="rp-lg" x1="5" y1="9.5" x2="23" y2="9.5" gradientUnits="userSpaceOnUse">
              <stop stop-color="#e8540a"/><stop offset="1" stop-color="#ff7240"/>
            </linearGradient>
          </defs>
        </svg>
        <span>cove</span>
      </a>
    </div>

    <!-- Reset form -->
    <div id="view-reset">
      <h1 class="auth-heading">Set a new password</h1>
      <p class="auth-sub">Enter a new password for your account.</p>

      <div id="reset-error" class="auth-error" role="alert"></div>

      <div class="auth-form">
        <div class="field">
          <label for="new-password">New password</label>
          <input type="password" id="new-password" placeholder="At least 8 characters" autocomplete="new-password" />
        </div>
        <div class="field">
          <label for="confirm-password">Confirm password</label>
          <input type="password" id="confirm-password" placeholder="Repeat password" autocomplete="new-password" />
        </div>
        <button class="btn btn--primary btn--full btn--lg" id="reset-btn" type="button">Set new password</button>
      </div>
    </div>

    <!-- Success -->
    <div id="view-done" class="hidden">
      <div style="text-align:center;padding:1rem 0">
        <div style="width:52px;height:52px;background:linear-gradient(135deg,#16a34a,#22c55e);border-radius:50%;display:grid;place-items:center;margin:0 auto 1.25rem">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <h1 class="auth-heading">Password updated</h1>
        <p class="auth-sub">Your password has been changed. You can now sign in with your new password.</p>
        <a href="/login" class="btn btn--primary btn--full btn--lg" style="margin-top:1.5rem;display:flex">Go to sign in</a>
      </div>
    </div>

    <!-- Expired / invalid token -->
    <div id="view-expired" class="hidden">
      <div style="text-align:center;padding:1rem 0">
        <div style="width:52px;height:52px;background:#FEF2F2;border:2px solid #FECACA;border-radius:50%;display:grid;place-items:center;margin:0 auto 1.25rem">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#EF4444" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16" stroke-width="3"/></svg>
        </div>
        <h1 class="auth-heading">Link expired</h1>
        <p class="auth-sub">This reset link is no longer valid. Links expire after 1 hour.</p>
        <a href="/login" class="btn btn--primary btn--full btn--lg" style="margin-top:1.5rem;display:flex">Request a new link</a>
      </div>
    </div>

    <div class="auth-back-wrap">
      <a href="/login" class="auth-back">← Back to sign in</a>
    </div>
  </div>

  <script>
    const token = new URLSearchParams(location.search).get('token');
    const resetError = document.getElementById('reset-error');

    if (!token) {
      document.getElementById('view-reset').classList.add('hidden');
      document.getElementById('view-expired').classList.remove('hidden');
    }

    document.getElementById('reset-btn')?.addEventListener('click', async () => {
      const password = document.getElementById('new-password').value;
      const confirm = document.getElementById('confirm-password').value;
      resetError.classList.remove('visible');

      if (!password || password.length < 8) {
        resetError.textContent = 'Password must be at least 8 characters.';
        resetError.classList.add('visible');
        return;
      }
      if (password !== confirm) {
        resetError.textContent = 'Passwords do not match.';
        resetError.classList.add('visible');
        return;
      }

      const btn = document.getElementById('reset-btn');
      btn.disabled = true;
      btn.textContent = 'Updating…';

      const res = await fetch('/api/auth/reset-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, password }),
      }).then(r => r.json()).catch(() => ({ ok: false, error: 'Network error — please try again.' }));

      if (res.ok) {
        document.getElementById('view-reset').classList.add('hidden');
        document.getElementById('view-done').classList.remove('hidden');
      } else if (res.error?.includes('expired') || res.error?.includes('invalid')) {
        document.getElementById('view-reset').classList.add('hidden');
        document.getElementById('view-expired').classList.remove('hidden');
      } else {
        resetError.textContent = res.error || 'Could not reset password. Please try again.';
        resetError.classList.add('visible');
        btn.disabled = false;
        btn.textContent = 'Set new password';
      }
    });

    document.getElementById('confirm-password')?.addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('reset-btn')?.click();
    });
  </script>
</body>
</html>
